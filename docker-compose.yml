# =============================================================================
#  docker-compose.yml — локальный/демо-стек price-tracker.
#  Сервисы: db (postgres), redis, web (gunicorn), worker (celery),
#  beat (celery beat). web/worker/beat используют один и тот же образ.
# =============================================================================

x-app: &app
  build: .
  image: pricetracker:latest
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pricetracker}
      POSTGRES_USER: ${POSTGRES_USER:-pricetracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricetracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pricetracker} -d ${POSTGRES_DB:-pricetracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    <<: *app
    command: ["/app/deploy/entrypoint.sh"]
    ports:
      - "8000:8000"

  worker:
    <<: *app
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  beat:
    <<: *app
    command: ["celery", "-A", "config", "beat", "-l", "info"]

volumes:
  pgdata:
