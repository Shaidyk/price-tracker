# =============================================================================
#  pyproject.toml — конфигурация инструментов качества (ruff / mypy / pytest).
#  Сам проект пакетируется не отсюда — это только настройки тулинга.
# =============================================================================

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# E/F — pycodestyle+pyflakes, I — isort, UP — pyupgrade, B — bugbear.
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# В миграциях Django длинные строки и автогенерация — не наша забота.
"**/migrations/*.py" = ["E501"]

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main"]
ignore_missing_imports = true
warn_unused_ignores = true
# Миграции Django — автоген, типизировать не нужно.
exclude = ["migrations/"]

[tool.django-stubs]
django_settings_module = "config.settings"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["tests"]
