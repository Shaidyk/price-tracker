# =============================================================================
#  GitLab CI — три стадии: lint -> test -> build.
# =============================================================================
stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

# --- Lint --------------------------------------------------------------------
lint:
  stage: lint
  image: python:3.12
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - ruff check .
    - mypy .
  # mypy со строгим django-stubs может ругаться на легаси — не блокируем пайплайн.
  allow_failure: true

# --- Test --------------------------------------------------------------------
test:
  stage: test
  image: python:3.12
  services:
    - name: postgres:16
      alias: postgres
    - name: redis:7
      alias: redis
  variables:
    POSTGRES_DB: pricetracker
    POSTGRES_USER: pricetracker
    POSTGRES_PASSWORD: pricetracker
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    DJANGO_SETTINGS_MODULE: config.settings
    # DEBUG=False по умолчанию → settings требует непустой секрет (см. config/settings.py).
    DJANGO_SECRET_KEY: ci-test-secret-key
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - pytest

# --- Build -------------------------------------------------------------------
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t pricetracker:$CI_COMMIT_SHORT_SHA .
  rules:
    # Сборка образа только на main и тегах (registry в тестовом не настраиваем).
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
    # На остальных ветках — допускаем падение (нет docker-окружения и т.п.).
    - when: manual
      allow_failure: true
